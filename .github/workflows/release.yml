name: Release

# Cuts a GitHub Release whenever a `v*` tag is pushed.
#
# Tag convention: `vMAJOR.MINOR.PATCH` (semver, no leading zeros in the
# pre-1.0 era is fine — `v0.1.0`, `v0.1.1`, etc.). The tag MUST match
# the version in `pyproject.toml` or the workflow fails fast — this
# stops "tagged v0.2.0 but pyproject still says 0.1.9" mistakes.
#
# Artifacts: sdist + wheel, built with the same `uv` pin CI uses.
# PyPI publish is intentionally NOT wired up yet — flip when the
# project is ready (see commented `publish` job below).

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify tag matches pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pyver=$(uv run python -c "import tomllib,sys; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$tag pyproject=$pyver"
          if [ "$tag" != "$pyver" ]; then
            echo "::error::Tag v$tag does not match pyproject version $pyver. Bump pyproject.toml first."
            exit 1
          fi

      - name: Build distributions
        run: uv build

      - name: List artifacts
        run: ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract changelog section for tag
        id: changelog
        run: |
          tag="${GITHUB_REF_NAME#v}"
          # Pull the section between `## [<tag>]` and the next `## [`.
          # Falls back to a generic note if the section is missing.
          awk -v tag="$tag" '
            $0 ~ "^## \\[" tag "\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No CHANGELOG entry for $tag — using auto-generated notes." > release_notes.md
          fi
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/*

  # ----------------------------------------------------------------------
  # PyPI publish via OIDC Trusted Publishing — wire up when ready.
  # 1) Configure a Trusted Publisher on PyPI for this repo + workflow.
  # 2) Uncomment the job below.
  # 3) Optionally gate on a `pypi` environment with manual approval.
  # ----------------------------------------------------------------------
  # publish-pypi:
  #   name: Publish to PyPI
  #   needs: build
  #   runs-on: ubuntu-latest
  #   environment:
  #     name: pypi
  #     url: https://pypi.org/p/dataset-scout
  #   permissions:
  #     id-token: write  # OIDC
  #   steps:
  #     - uses: actions/download-artifact@v4
  #       with:
  #         name: dist
  #         path: dist/
  #     - uses: pypa/gh-action-pypi-publish@release/v1
