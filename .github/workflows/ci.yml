name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref (PR or branch) when a new
# commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only; jobs needing more must opt in explicitly.
permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # `--dev` (not `--all-extras`) — the optional `langid` extra
      # pulls fasttext, which fails to build on Windows runners and
      # isn't wired into any code path yet.
      - name: Sync dependencies
        run: uv sync --dev

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy

      # Unit + recorded tests both gate every PR per pyproject markers.
      # `live` and `perf` tests are intentionally excluded.
      - name: pytest
        run: uv run pytest -m "unit or recorded" -v
